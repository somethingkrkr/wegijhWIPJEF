<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  /* 2x2 영상 그리드 레이아웃 설정 */
  .cctv-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-top: 30px;
    width: 100%;
  }

  .video-container {
    width: 100%;
    position: relative;
    padding-top: 56.25%; /* 16:9 비율 유지 */
    background-color: #000;
    border-radius: 8px;
    overflow: hidden;
  }

  /* video 태그 꽉 차게 설정 */
  .video-container video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* CCTV 위치 라벨 스타일 */
  .cctv-label {
    position: absolute;
    top: 10px;
    left: 10px;
    background-color: rgba(0, 0, 0, 0.6);
    color: #fff;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: bold;
    z-index: 10;
    pointer-events: none; /* 클릭 방해 방지 */
  }

  @media (max-width: 768px) {
    .cctv-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<section id="philosophy" class="philosophy-section reveal-up">
    <div class="container">
        <blockquote class="philosophy-quote">
            "실시간 CCTV, <br>
            <span>서울 한강 주요 대교</span> 교통상황을 중계합니다."
        </blockquote>
        
        <div class="cctv-grid">
            <div class="video-container">
                <div class="cctv-label">한남대교 남단</div>
                <video id="cctv1" controls muted autoplay playsinline></video>
            </div>
            <div class="video-container">
                <div class="cctv-label">성수대교 북단</div>
                <video id="cctv2" controls muted autoplay playsinline></video>
            </div>
            <div class="video-container">
                <div class="cctv-label">마포대교 북단 (강변북로)</div>
                <video id="cctv3" controls muted autoplay playsinline></video>
            </div>
            <div class="video-container">
                <div class="cctv-label">반포대교 남단 (올림픽대로)</div>
                <video id="cctv4" controls muted autoplay playsinline></video>
            </div>
        </div>
    </div>
</section>

<script>
  // 서울 한강 주변 주요 CCTV M3U8 스트리밍 주소 (서울시 TOPIS 기준 예시)
  const cctvStreams = [
    { id: 'cctv1', url: 'https://topiscctv1.eseoul.go.kr/sd2/ch11.stream/playlist.m3u8' }, // 한남/경부 방면 예시
    { id: 'cctv2', url: 'https://topiscctv1.eseoul.go.kr/sd2/ch21.stream/playlist.m3u8' }, // 성수/동부 방면 예시
    { id: 'cctv3', url: 'https://topiscctv1.eseoul.go.kr/sd2/ch31.stream/playlist.m3u8' }, // 마포/강변북로 예시
    { id: 'cctv4', url: 'https://topiscctv1.eseoul.go.kr/sd2/ch41.stream/playlist.m3u8' }  // 반포/올림픽대로 예시
  ];

  function initCCTV(cameraId, streamUrl) {
    const video = document.getElementById(cameraId);

    if (Hls.isSupported()) {
      const hls = new Hls({
        manifestLoadingMaxRetry: 4,
        manifestLoadingRetryDelay: 2000,
        levelLoadingMaxRetry: 4,
      });

      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play().catch(e => console.log(cameraId + " 자동 재생 차단됨:", e));
      });

      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              hls.startLoad();
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError();
              break;
            default:
              hls.destroy();
              break;
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari 등 네이티브 HLS 지원 브라우저용
      video.src = streamUrl;
      video.addEventListener('loadedmetadata', function() {
        video.play();
      });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    cctvStreams.forEach(stream => initCCTV(stream.id, stream.url));
  });
</script>
